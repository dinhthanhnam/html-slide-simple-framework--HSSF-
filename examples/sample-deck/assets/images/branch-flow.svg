<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="title desc">
  <title id="title">Git branch flow</title>
  <desc id="desc">main line with feature branch and merge back</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#BE2727"/>
    </marker>
  </defs>
  <rect width="720" height="280" fill="#FEF2F2" rx="12"/>
  <!-- main line -->
  <line x1="60" y1="160" x2="660" y2="160" stroke="#BE2727" stroke-width="4"/>
  <circle cx="100" cy="160" r="10" fill="#BE2727"/>
  <circle cx="260" cy="160" r="10" fill="#BE2727"/>
  <circle cx="480" cy="160" r="10" fill="#BE2727"/>
  <circle cx="620" cy="160" r="10" fill="#991B1B"/>
  <text x="100" y="200" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="14" fill="#333">C1</text>
  <text x="260" y="200" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="14" fill="#333">C2</text>
  <text x="480" y="200" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="14" fill="#333">C4</text>
  <text x="620" y="200" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="14" fill="#333">merge</text>
  <text x="60" y="140" font-family="Montserrat, sans-serif" font-size="16" font-weight="700" fill="#BE2727">main</text>
  <!-- feature branch -->
  <path d="M260 160 C 300 160, 300 80, 340 80 L 420 80" fill="none" stroke="#991B1B" stroke-width="3" stroke-dasharray="6 4"/>
  <path d="M420 80 C 460 80, 460 160, 480 160" fill="none" stroke="#991B1B" stroke-width="3" marker-end="url(#arrow)"/>
  <circle cx="380" cy="80" r="10" fill="#991B1B"/>
  <text x="380" y="60" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="14" fill="#333">C3 feature</text>
  <text x="340" y="40" font-family="Montserrat, sans-serif" font-size="16" font-weight="700" fill="#991B1B">feature/*</text>
</svg>
